<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affectation Auteur</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <main class="container page-content">

        <h2 class="page-title">Affectation Auteur</h2>
        <p class="url-display">localhost:8080/livre/affecterAuteur</p>

        <div class="card">
            <h3>Affectation des auteurs aux livres</h3>

            <form th:action="@{/livre/affecterAuteur}" method="post" class="form-group">

                <div class="form-field">
                    <label for="livreIsbn">Livre :</label>

                    <select id="livreIsbn" name="livreIsbn" class="form-control form-select">
                        <option value="">Sélectionner un livre</option>
                        <option th:each="livre : ${livres}"
                                th:value="${livre.isbn}"
                                th:text="${livre.titre}">
                        </option>
                    </select>
                </div>

                <div class="form-field">
                    <label for="auteurId">Auteur :</label>

                    <select id="auteurId" name="auteurId" class="form-control form-select">
                        <option value="">Sélectionner un auteur</option>
                        <option th:each="auteur : ${auteurs}"
                                th:value="${auteur.id}"
                                th:text="${auteur.nomPrenom}">
                        </option>
                    </select>
                </div>

                <button type="submit" class="btn btn--primary">Ajouter</button>

            </form>

            <hr class="divider">

            <h3>Liste de tous les auteurs</h3>

            <table class="data-table">
                <thead>
                    <tr>
                        <th>Id</th>
                        <th>Nom Prénom</th>
                        <th>Points</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="auteur : ${auteurs}">
                        <td th:text="${auteur.id}"></td>
                        <td th:text="${auteur.nomPrenom}"></td>
                        <td th:text="${auteur.nbrePoints}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(auteurs)}">
                        <td colspan="3" class="empty-msg">Aucun auteur enregistré.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <a th:href="@{/}" class="link-back">&larr; Retour au Menu</a>

    </main>
</body>
</html>
